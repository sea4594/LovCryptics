<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f10" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>Cryptic Cache</title>
</head>
<body>
  <!-- HOME VIEW -->
  <main id="homeView" class="view">
    <div class="homeTop">
      <div class="homeTitle">
        <h1>Cryptic Cache</h1>
        <div id="homeStatus" class="muted">Syncing…</div>
      </div>
      <button id="filterBtn" class="chip" aria-pressed="false">Show incomplete</button>
    </div>

    <div id="archive" class="archive"></div>
  </main>

  <!-- PUZZLE VIEW -->
  <main id="puzzleView" class="view hidden">
    <div class="topbar">
      <div class="timer" id="timer">00:00</div>

      <div class="topbarRight">
        <button id="hintBtn" class="iconBtn" title="Hints" aria-label="Hints">Hint</button>
        <button id="menuBtn" class="iconBtn" title="Menu" aria-label="Menu">Menu</button>
      </div>
    </div>

    <div id="clueBar" class="clueBar hidden"></div>

    <div class="gridShell">
      <div id="grid" class="grid" role="grid" aria-label="Puzzle grid"></div>
    </div>

    <!-- Hidden input to summon keyboard without showing caret -->
    <input id="kbd" class="kbd" autocomplete="off" autocapitalize="characters" spellcheck="false" />
  </main>

  <!-- Menus -->
  <div id="hintMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <button class="sheetItem" id="revealLetterBtn">Reveal selected letter</button>
      <button class="sheetItem" id="revealWordBtn">Reveal selected word</button>
      <button class="sheetItem" id="checkWordBtn">Check selected word</button>
      <button class="sheetItem" id="checkPuzzleBtn">Check entire puzzle</button>
      <button class="sheetCancel" data-close="hintMenu">Cancel</button>
    </div>
  </div>

  <div id="mainMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <button class="sheetItem" id="toggleChecksBtn" aria-pressed="false">Word checks: Off</button>
      <button class="sheetItem" id="saveExitBtn">Save & exit</button>
      <button class="sheetItem danger" id="restartBtn">Restart</button>
      <button class="sheetCancel" data-close="mainMenu">Cancel</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
