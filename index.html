<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f4f6ff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>LovCryptics</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- HOME VIEW -->
  <main id="homeView" class="view">
    <div class="homeTop">
      <div class="homeLeft">
        <button id="homeMenuBtn" class="chip iconChip" aria-label="Menu">☰</button>
        <div class="homeTitle">
          <img src="icons/icon-32.png" alt="LovCryptics logo" class="homeLogo" />
          <div>
            <h1>LovCryptics</h1>
            <div id="homeStatus" class="muted">Loading…</div>
          </div>
        </div>
      </div>

      <div class="homeActions">
        <button id="sortBtn" class="chip" aria-label="Sort"></button>
        <button id="filterBtn" class="chip" aria-label="Filter"></button>
      </div>
    </div>

    <div id="archive" class="archive" aria-label="Puzzle list"></div>
  </main>

  <!-- PUZZLE VIEW -->
  <main id="puzzleView" class="view hidden">
    <div class="topbar">
      <div class="topbarLeft">
        <button id="menuBtn" class="iconBtn iconChipTop" aria-label="Menu">☰</button>
        <div class="brandMini">LovCryptics</div>
      </div>

      <div class="timer" id="timer">00:00</div>

      <div class="topbarRight">
        <button id="hintBtn" class="iconBtn" aria-label="Hints">Hint</button>
      </div>
    </div>

    <div id="clueBar" class="clueBar hidden"></div>

    <div class="gridShell">
      <div id="grid" class="grid" role="grid" aria-label="Puzzle grid"></div>
    </div>

    <input id="kbd" class="kbd" autocomplete="off" autocapitalize="characters" spellcheck="false" />
  </main>

  <!-- HOME MENU -->
  <div id="homeMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle">Menu</div>
      <div class="sheetBody" id="accountLine">Not signed in</div>
      <button class="sheetItem" id="loginBtn">Login</button>
      <button class="sheetItem hidden" id="logoutBtn">Logout</button>
      <div class="sheetDivider"></div>
      <button class="sheetItem" id="homeThemeBtn">Themes</button>
      <button class="sheetCancel" data-close="homeMenu">Cancel</button>
    </div>
  </div>

  <!-- THEME MENU -->
  <div id="themeMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle">Themes</div>

      <div class="themeSwitchRow">
        <div class="themeSwitchLabel">Mode</div>
        <label class="themeSwitch">
          <input id="themeModeToggle" type="checkbox" />
          <span class="themeSwitchPill" aria-hidden="true"></span>
        </label>
        <div id="themeModeLabel" class="themeSwitchValue">Light</div>
      </div>

      <div class="sheetDivider"></div>

      <button class="sheetItem" data-theme-base="blackwhite">Black &amp; White</button>
      <button class="sheetItem" data-theme-base="sage">Sage</button>
      <button class="sheetItem" data-theme-base="lavender">Lavender</button>
      <button class="sheetItem" data-theme-base="ocean">Ocean</button>
      <button class="sheetItem" data-theme-base="sand">Sand</button>

      <button class="sheetCancel" data-close="themeMenu">Cancel</button>
    </div>
  </div>

  <!-- SORT MENU -->
  <div id="sortMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle">Sort</div>
      <button class="sheetItem" data-sort="recent">Recent</button>
      <button class="sheetItem" data-sort="newest">Newest → Oldest</button>
      <button class="sheetItem" data-sort="oldest">Oldest → Newest</button>
      <button class="sheetCancel" data-close="sortMenu">Cancel</button>
    </div>
  </div>

  <!-- FILTER MENU -->
  <div id="filterMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle">Filter</div>
      <button class="sheetItem" data-filter="all">All</button>
      <button class="sheetItem" data-filter="incomplete">In Progress</button>
      <button class="sheetItem" data-filter="completed">Completed</button>
      <button class="sheetItem" data-filter="not_started">Not started</button>
      <button class="sheetCancel" data-close="filterMenu">Cancel</button>
    </div>
  </div>

  <!-- HINTS -->
  <div id="hintMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle">Hints</div>
      <button class="sheetItem" id="revealLetterBtn">Reveal selected letter</button>
      <button class="sheetItem" id="revealWordBtn">Reveal selected word</button>
      <button class="sheetItem" id="checkWordBtn">Check selected word (delete wrong)</button>
      <button class="sheetItem" id="checkPuzzleBtn">Check entire puzzle (delete wrong)</button>
      <div class="sheetDivider"></div>
      <button class="sheetItem" id="toggleChecksBtn" aria-pressed="false">Word checks: Off</button>
      <button class="sheetCancel" data-close="hintMenu">Cancel</button>
    </div>
  </div>

  <!-- PUZZLE MENU -->
  <div id="mainMenu" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle brandTitle">LovCryptics</div>
      <button class="sheetItem" id="saveExitBtn">Exit to menu</button>
      <button class="sheetItem" id="puzzleThemeBtn">Themes</button>
      <button class="sheetItem danger" id="restartBtn">Restart</button>
      <button class="sheetCancel" data-close="mainMenu">Cancel</button>
    </div>
  </div>

  <!-- RESTART CONFIRM -->
  <div id="restartConfirm" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle">Restart puzzle?</div>
      <div class="sheetBody">This clears entries and resets time for this puzzle.</div>
      <button class="sheetItem danger" id="restartYesBtn">Yes, restart</button>
      <button class="sheetCancel" data-close="restartConfirm">Cancel</button>
    </div>
  </div>

  <!-- CONGRATS -->
  <div id="congrats" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheetCard">
      <div class="sheetTitle">🎉 Congratulations</div>
      <div class="sheetBody" id="congratsBody">Solved in 00:00</div>
      <button class="sheetItem" id="congratsExitBtn">Exit to menu</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
