name: Cache Lovatt puzzles

on:
  schedule:
    - cron: "20 6 * * *"    # daily at 06:20 UTC (catches early-UTC puzzles)
    - cron: "0 16 * * *"    # daily at 16:00 UTC (catches mid-UTC / late AEST puzzles)
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill older dates (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip

      - name: Fetch puzzles
        env:
          PSID: "100000160"
          BACKFILL: ${{ github.event.inputs.backfill }}
        run: |
          python scripts/fetch_puzzles.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add puzzles
          if git diff --cached --quiet; then
            echo "No changes."
          else
            # Bump version.json so the service worker cache-busts and re-fetches
            # the updated puzzle index. Bot pushes don't trigger version_sha.yml,
            # so we must update it here to ensure users see new puzzles promptly.
            LATEST_DATE=$(python3 -c "import json; idx=json.load(open('puzzles/index.json')); print(sorted(idx['dates'])[-1])")
            echo "{ \"build\": \"puzzles-${LATEST_DATE}\" }" > version.json
            git add version.json
            git commit -m "Update puzzle cache"
            git push
          fi
